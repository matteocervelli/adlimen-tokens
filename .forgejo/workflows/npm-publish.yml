# =============================================================================
# NPM Publish for adlimen-tokens
#
# Publishes the package to the private Forgejo NPM registry.
# No build step — publishes raw JS/SCSS files declared in package.json exports.
#
# Trigger: push a semver tag (v*.*.*)
#
# Required repo secrets:
#   NPM_TOKEN — Forgejo personal token with package:write scope
#
# Optional secrets (for Telegram notifications):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
#   TELEGRAM_TOPIC_ID
# =============================================================================

name: NPM Publish

on:
  push:
    tags: ["v*.*.*"]

jobs:
  # ===========================================================================
  # 1. PUBLISH
  # ===========================================================================
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate and check registry
        id: preflight
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "❌ Tag v${TAG} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "✅ Version match: ${PKG_VERSION}"
          # Skip if already in registry (idempotent on tag retrigger)
          ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "${PKG_NAME}")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://git.adlimen.dev/api/packages/adlimen/npm/${ENCODED}/${TAG}" \
            -H "Authorization: Bearer ${NPM_TOKEN}")
          if [ "$STATUS" = "200" ]; then
            echo "⏭ ${PKG_NAME} ${TAG} already in registry — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure NPM registry auth
        if: steps.preflight.outputs.skip != 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//git.adlimen.dev/api/packages/adlimen/npm/:_authToken=${NPM_TOKEN}" >> .npmrc

      - name: Publish to Forgejo NPM registry
        if: steps.preflight.outputs.skip != 'true'
        run: npm publish

  # ===========================================================================
  # 2. NOTIFY
  # ===========================================================================
  notify:
    needs: publish
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_number }}
        run: |
          if [ -z "${TELEGRAM_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram not configured, skipping"; exit 0
          fi
          TAG="${{ github.ref_name }}"
          PKG=$(echo "${REPO}" | cut -d/ -f2)
          if [ "${{ needs.publish.result }}" = "success" ]; then
            MSG="📦 *${PKG}* ${TAG} published to NPM registry"
          else
            MSG="❌ *${PKG}* ${TAG} NPM publish FAILED [→ logs](https://git.adlimen.dev/${REPO}/actions/runs/${RUN_ID})"
          fi
          TOPIC_PARAM=""
          [ -n "${TELEGRAM_TOPIC_ID}" ] && TOPIC_PARAM="-d message_thread_id=${TELEGRAM_TOPIC_ID}"
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" ${TOPIC_PARAM} \
            -d parse_mode="Markdown" \
            --data-urlencode "text=${MSG}" || echo "Telegram notification failed (non-fatal)"
